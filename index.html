<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Rodrigo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="logo">Rodrigo Lima</div>
    <nav class="menu">
      <a href="#inicio" class="menu-btn">Início</a>
      <a href="#contato" class="menu-btn">Contato</a>
    </nav>
  </header>

  <main class="main">
    <section id="inicio" class="box box-inicio">
      <img src="./f33d84aa-c922-4dc7-b58f-f35e736184da.jpg" alt="Foto Rodrigo" class="foto">
      <h2 class="titulo">Professor</h2>
      <p class="texto"><strong>Habilidades:</strong> HTML • CSS • Git</p>
    </section>

    <section id="contato" class="box box-contato">
      <h3 class="titulo">Fale Conosco</h3>
      <form id="form" class="form" action="#" method="post">
        <input name="nome" type="text" class="input" placeholder="Seu nome" required>
        <input name="email" type="email" class="input" placeholder="Seu email" required>
        <textarea name="mensagem" rows="4" class="input" placeholder="Sua mensagem" required></textarea>
        <button type="submit" class="btn">Enviar</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <p class="texto-footer">Rodrigo Lima © 2025</p>
    <div class="redes-sociais">
      <a href="#" class="menu-btn">Facebook</a>
      <a href="#" class="menu-btn">Instagram</a>
      <a href="#" class="menu-btn">LinkedIn</a>
    </div>
  </footer>

  <script>
    document.getElementById('form').addEventListener('submit', function(e){
      e.preventDefault();
      alert('Mensagem enviada — obrigado!');
      this.reset();
    });
  </script>

</body>
</html>
